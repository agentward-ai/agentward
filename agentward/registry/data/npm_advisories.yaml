    payload: "Cryptominer + credential stealer (malicious preinstall.sh)"
    severity: "critical"
    notes: >
      Attacker gained access to maintainer's npm account and published three
      malicious versions simultaneously. The preinstall script downloaded and
      executed a cryptominer and credential stealer.

  - package: "colors"
