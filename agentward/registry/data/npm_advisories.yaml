advisories:
  - package: "axios"
    compromised_versions: ["1.14.1", "0.30.4"]
    date: "2026-03-25"
    actor: "UNC1069 (DPRK)"
    attack_type: "maintainer-account-hijack"
    payload: "WAVESHAPER.V2 RAT via postinstall hook in plain-crypto-js dependency"
    severity: "critical"
    notes: >
      Compromised npm maintainer account used to publish malicious versions.
      plain-crypto-js 4.2.1 added as dependency, which executes a XOR-obfuscated
      dropper via postinstall hook that self-deletes after execution.

  - package: "plain-crypto-js"
    compromised_versions: ["4.2.1"]
    date: "2026-03-25"
    actor: "UNC1069 (DPRK)"
    attack_type: "malicious-dependency"
    payload: "XOR-obfuscated dropper via setup.js postinstall hook"
    severity: "critical"
    notes: >
      Injected as a dependency of compromised axios versions. The postinstall
      script (setup.js) uses a position-dependent XOR cipher (key[7 * i^2 % 10])
      to decode and execute a WAVESHAPER.V2 remote access trojan, then self-deletes.

  - package: "event-stream"
    compromised_versions: ["3.3.6"]
    date: "2018-11-26"
    actor: "right9ctrl (social engineering)"
    attack_type: "maintainer-social-engineering"
    payload: "Cryptocurrency wallet theft targeting Copay Bitcoin wallet app"
    severity: "critical"
    notes: >
      Attacker convinced original maintainer to transfer ownership, then published
      a new version with a malicious flatmap-stream dependency that targeted the
      Copay Bitcoin wallet app specifically.

  - package: "ua-parser-js"
