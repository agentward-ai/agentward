name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          # Install with all optional extras so every code path imports.
          pip install -e ".[sanitize,judge]"
          # Test deps not declared in pyproject (no [dev] extras yet).
          pip install pytest pytest-asyncio

      - name: Run pytest
        run: pytest -q

  lint:
    name: Lint and type-check (advisory)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package + lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[sanitize,judge]"
          pip install ruff mypy

      # Ruff and mypy are run as advisory checks (continue-on-error) on the
      # first CI iteration: the existing codebase has lint debt that needs
      # to be paid down separately. They surface as warnings on PRs without
      # blocking merge so the test gate ships immediately.

      - name: Ruff (advisory)
        continue-on-error: true
        run: ruff check agentward/

      - name: Mypy (advisory)
        continue-on-error: true
        run: mypy agentward/

  security:
    name: Dependency audit (advisory)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + security tools
        run: |
          python -m pip install --upgrade pip
          # Install agentward into the env so pip-audit can audit the
          # full transitive-dependency tree.
          pip install -e ".[sanitize,judge]"
          pip install pip-audit bandit

      - name: pip-audit (advisory)
        continue-on-error: true
        run: pip-audit

      - name: bandit (advisory)
        continue-on-error: true
        run: bandit -q -r agentward/ -ll
